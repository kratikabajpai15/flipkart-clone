<!DOCTYPE html>
<html>
<head>
<title>Flipkart Clone</title>
<!-- CSS Link -->
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<!-- NAVBAR -->
<div class="navbar">
<div class="logo">
<img src="flipkart-logo.png" alt="Flipkart Logo">
</div>
<input type="text" placeholder="Search" class="search">
<div class="nav-right">
<a href="#">Login</a>
<a href="#">Cart</a>
<a href="#">More</a>
</div>
</div>
<!-- CATEGORY -->
<div class="category">
<a href="#">Mobiles</a>
<a href="#">Electronic</a>
<a href="#">Fashion</a>
<a href="#">Toys</a>
<a href="#">Laptop</a>
<a href="#">Beauty</a>
</div>
<!-- BANNER -->
<div class="banner">
<img src="sale-a.jpg" alt="Sale Banner">
<div class="banner-text">
Starts from 16 March 2026 to 22 April 2026
</div>
</div>
<!-- TOP CATEGORIES -->
<div class="section">
<h2>Top Categories</h2>
<div class="products">
<div class="card">
<img src="mobile.jpg" alt="Mobile">
<p>Mobile</p><br>
<p>Upto 43% off</p>
</div>
<div class="card">
<img src="electronic-appliances.jpg" alt="Electronic">
<p>Electronic</p><br>
<p>Upto 40% off</p>
</div>
<div class="card">
<img src="fashion.png" alt="Fashion">
<p>Fashion</p><br>
<p>Upto 60% off</p>
</div>
<div class="card">
<img src="toys.jpg" alt="Toys">
<p>Toys</p><br>
<p>Upto 55% off</p>
</div>
<div class="card">
<img src="laptop.jpg" alt="Laptop">
<p>Laptop</p><br>
<p>Upto 45% off</p>
</div>
<div class="card">
<img src="beauty.jpg" alt="Beauty">
<p>Beauty</p><br>
<p>Upto 35% off</p>
</div>
</div>
</div>
<!-- FOOTER -->
<footer>
Flipkart Clone | KRATIKA BAJPAI
</footer>
</body>
</html>
